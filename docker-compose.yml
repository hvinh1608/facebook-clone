version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexus-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: nexus-backend
    restart: always
    command: sh -c "npm run db:generate && npm run dev --workspace=apps/backend"
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/nexus?schema=public"
      JWT_ACCESS_SECRET: "nexus_access_token_secret_key_change_me_in_production"
      JWT_REFRESH_SECRET: "nexus_refresh_token_secret_key_change_me_in_production"
      FRONTEND_URL: "http://localhost:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/apps/backend/node_modules
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: nexus-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:5000/api"
      NEXT_PUBLIC_SOCKET_URL: "http://localhost:5000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/apps/frontend/node_modules
      - /usr/src/app/apps/frontend/.next
    depends_on:
      - backend

volumes:
  postgres_data:
